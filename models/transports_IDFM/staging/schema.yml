  - name: stg_profil_fer_2023_s1
    description: "Staging — Profil horaire de fréquentation du réseau ferré IDFM pour le semestre 1 de 2023. Contient la répartition des validations par heure et par catégorie de jour."
    columns:
      - name: id_transporteur_stif
        description: "Identifiant STIF du transporteur"
        tests:
          - not_null
      - name: id_reseau_stif
        description: "Identifiant STIF du réseau"
      - name: id_arret_stif
        description: "Identifiant STIF de l'arrêt"
      - name: libelle_arret
        description: "Nom de l'arrêt"
      - name: id_zone_arret
        description: "Identifiant de la zone d'arrêt"
      - name: categorie_jour
        description: "Catégorie du jour (DIJFP, JOHV, JOVS, SAHV, SAVS)"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['DIJFP', 'JOHV', 'JOVS', 'SAHV', 'SAVS']
      - name: heure
        description: "Heure de début de la tranche horaire"
      - name: validations_pct
        description: "Pourcentage de validations sur cette tranche par rapport à la journée"
        tests:
          - not_null

