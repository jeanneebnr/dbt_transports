version: 2

models:

  # ============================================================
  # INTERMEDIAIRES
  # ============================================================

  - name: int_arrets_idfm
    columns:
      - name: id_arret_idfm
        tests:
          - not_null
          - unique
      - name: id_zdc
        tests:
          - not_null

  - name: int_arrets_stif
    columns:
      - name: id_arret_stif
        tests:
          - not_null
      - name: id_zdc
        tests:
          - not_null
      - name: id_transporteur_stif
        tests:
          - not_null

  - name: int_arrets_total
    columns:
      - name: id_zdc
        tests:
          - not_null
      - name: zdc_origin
        tests:
          - not_null

  - name: int_lignes_idfm
    columns:
      - name: id_ligne_idfm
        tests: []

  - name: int_lignes_stif
    columns:
      - name: private_code
        tests:
          - not_null
          - unique

  - name: int_lignes_total
    columns:
      - name: private_code
        tests: []

  # ============================================================
  # DIMENSIONS
  # ============================================================

  - name: dim_arrets_lignes
    columns:
      - name: id_arret_zda
        tests:
          - not_null
      - name: id_ligne
        tests:
          - not_null

  - name: dim_arrets_zdc
    columns:
      - name: id_arret
        tests:
          - not_null
          - unique
      - name: libelle_arret
        tests:
          - not_null

  - name: dim_categorie_titres
    columns:
      - name: id_titre
        tests:
          - not_null
          - unique
      - name: titre
        tests:
          - not_null
          - unique

  - name: dim_date
    columns:
      - name: date
        tests:
          - not_null
          - unique
      - name: annee
        tests:
          - not_null
      - name: mois
        tests:
          - not_null
      - name: jour
        tests:
          - not_null
      - name: categorie_jour
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['DIJFP', 'JOHV', 'JOVS', 'SAHV', 'SAVS']

  - name: dim_lignes
    columns:
      - name: id_ligne
        tests:
          - not_null
          - unique
      - name: surface_or_fer
        tests:
          - accepted_values:
              arguments:
                values: ['fer', 'surface', 'non classifié']

  - name: dim_liste_transporteurs
    columns:
      - name: id_operateur
        tests:
          - not_null
          - unique
      - name: libelle_transporteur
        tests:
          - not_null
      - name: transporteur_ref
        tests:
          - not_null

  # ============================================================
  # FACTS
  # ============================================================

  - name: fact_meteo
    columns:
      - name: id_meteo
        tests:
          - not_null
          - unique
      - name: date
        tests:
          - not_null
          - unique
      - name: temp_moy
        tests:
          - not_null
      - name: temp_max
        tests:
          - not_null
      - name: temp_min
        tests:
          - not_null

  - name: fact_nb_fer
    columns:
      - name: date
        tests:
          - not_null
      - name: id_arret
        tests:
          - not_null
      - name: id_titre
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_categorie_titres')
                field: id_titre
      - name: validations_nb
        tests:
          - not_null

  - name: fact_nb_surface
    columns:
      - name: date
        tests:
          - not_null
      - name: id_titre
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_categorie_titres')
                field: id_titre
      - name: validations_nb
        tests:
          - not_null

  - name: fact_profil_fer
    columns:
      - name: id_arret
        tests:
          - not_null
      - name: categorie_jour
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['DIJFP', 'JOHV', 'JOVS', 'SAHV', 'SAVS']
      - name: heure
        tests:
          - not_null
      - name: validations_pct
        tests:
          - not_null

  - name: fact_profil_surface
    columns:
      - name: categorie_jour
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['DIJFP', 'JOHV', 'JOVS', 'SAHV', 'SAVS']
      - name: heure
        tests:
          - not_null
      - name: validations_pct
        tests:
          - not_null

  - name: fact_trafic_heure
    columns:
      - name: id_trafic
        tests:
          - not_null
          - unique
      - name: date
        tests:
          - not_null
      - name: heure
        tests:
          - not_null
      - name: id_ligne
        tests:
          - not_null
      - name: freq_theo
        tests:
          - not_null
      - name: freq_reel
        tests:
          - not_null
      - name: taux_service_pct
        tests:
          - not_null
      - name: retard_moyen_minute
        tests:
          - not_null